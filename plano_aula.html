<!DOCTYPE html>
<html lang="gl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Aula · 4º B</title>
<meta name="author" content="Montserrat Blanco Vázquez"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--card:#1e293b;--card2:#263347;--border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);--white:#f1f5f9;--muted:rgba(241,245,249,.45);
  --gold:#f59e0b;--purple:#a78bfa;--green:#22c55e;--red:#ef4444;--blue:#60a5fa;
  --teal:#2dd4bf;--shadow:0 2px 12px rgba(0,0,0,.3);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--white);min-height:100vh;padding:0}
.header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-family:'DM Serif Display',Georgia,serif;font-size:1.2rem;color:var(--gold)}
.header-right{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.btn{height:32px;padding:0 14px;border:none;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.76rem;font-weight:800;display:inline-flex;align-items:center;gap:5px;transition:transform .12s}
.btn:hover{transform:scale(1.04)}.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#0f172a}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--white)}
.btn-red{background:rgba(239,68,68,.15);color:var(--red);border:1.5px solid rgba(239,68,68,.4)}
.btn-sm{height:27px;padding:0 10px;font-size:.68rem}
.btn-blue{background:rgba(96,165,250,.2);color:var(--blue);border:1.5px solid rgba(96,165,250,.4)}

/* PLANS TABS */
.plans-bar{display:flex;gap:6px;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;flex-wrap:wrap;align-items:center}
.plan-tab{height:28px;padding:0 12px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:all .15s}
.plan-tab.active{background:var(--gold);color:#0f172a;border-color:var(--gold)}
.plan-tab:hover:not(.active){color:var(--white);border-color:var(--border2)}

/* MAIN LAYOUT */
.main{display:flex;height:calc(100vh - 108px);overflow:hidden}
.sidebar{width:170px;flex-shrink:0;background:var(--card2);border-right:1px solid var(--border);overflow-y:auto;padding:12px}
.sidebar-title{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px}
.alumno-chip{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;cursor:grab;user-select:none;background:var(--card);border:1px solid var(--border);margin-bottom:4px;font-size:.75rem;font-weight:800;transition:all .15s}
.alumno-chip:hover{border-color:var(--border2);background:var(--card2)}
.alumno-chip.dragging{opacity:.4}
.alumno-chip.placed{opacity:.5;background:rgba(255,255,255,.03)}
.av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:900;color:white;flex-shrink:0}

/* CANVAS */
.canvas-wrap{flex:1;overflow:auto;padding:8px 10px;position:relative;display:flex;flex-direction:column}
.canvas{position:relative;min-width:800px;min-height:calc(100vh - 200px);background:rgba(255,255,255,.02);border:1.5px dashed var(--border2);border-radius:16px;flex:1}

/* MESA */
.mesa-group{transition:box-shadow .15s;box-shadow:var(--shadow)}
.mesa-group:hover{box-shadow:0 0 0 2px rgba(245,158,11,.35),var(--shadow)}
.mesa-group.empty{opacity:.65}
.seat{transition:all .15s;min-height:60px}
.seat:hover{filter:brightness(1.15)}
.empty-seat{background:rgba(255,255,255,.03)!important;border:1.5px dashed rgba(255,255,255,.12)!important}
.empty-seat:hover{background:rgba(245,158,11,.08)!important;border-color:rgba(245,158,11,.4)!important}
/* keep old .mesa for compat */
.mesa{position:absolute;cursor:grab}

/* TOOLBAR */
.canvas-toolbar{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px;width:340px;max-width:95vw;border:1px solid var(--border2)}
.modal h3{font-family:'DM Serif Display',serif;font-size:1.1rem;margin-bottom:14px;color:var(--gold)}
.inp{width:100%;padding:8px 12px;background:var(--card2);border:1px solid var(--border2);border-radius:9px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.82rem;margin-bottom:10px}
.modal-row{display:flex;gap:8px;justify-content:flex-end;margin-top:8px}

/* PRINT */
@media print{
  .header,.sidebar,.plans-bar,.canvas-toolbar,.btn,.modal-bg{display:none!important}
  .main{height:auto;display:block}
  .canvas-wrap{padding:0;overflow:visible}
  .canvas{border:none;min-height:auto}
  .mesa{break-inside:avoid}
  body{background:white;color:#1e293b}
  .mesa{background:#f8fafc;border-color:#e2e8f0}
  .mesa-nome{color:#1e293b}
  .mesa-info{color:#64748b}
}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:1.5rem">🗺️</span>
  <h1>Plano de Aula · 4º B</h1>
<div id="_hdr-info" style="display:none;font-size:.62rem;font-weight:700;letter-spacing:.04em;color:rgba(238,242,255,.45);margin-top:2px;padding-left:2px"></div>
  <div class="header-right">
    <button class="btn btn-ghost btn-sm" id="btn-modo" onclick="toggleModo()">☀️ Claro</button>
    <button class="btn btn-ghost btn-sm" onclick="window.print()">&#x1F5A8;&#xFE0F; Imprimir</button>
    <button class="btn btn-ghost btn-sm" onclick="exportarCSVPlan()">&#x1F4CA; CSV</button>
    <button class="btn btn-ghost btn-sm" onclick="exportarJSON()">&#x1F4E4; JSON</button>
    <button class="btn btn-ghost btn-sm" onclick="importarJSON()">📥 Importar</button>
    <button class="btn btn-ghost btn-sm" href="PORTAL_DOCENTE.html" title="Configuración docente" style="background:transparent;border:none;cursor:pointer;font-size:.7rem;text-decoration:none">&#x2699;&#xFE0F;</a>
    <button onclick="window.location.href='PORTAL_DOCENTE.html'">🏠 Portal</button>
  </div>
</div>

<!-- PLANS BAR -->
<div class="plans-bar" id="plans-bar">
  <span style="font-size:.65rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0">Plano:</span>
  <!-- plans rendered here -->
  <button class="btn btn-blue btn-sm" onclick="novoPlan()" style="flex-shrink:0">+ Novo plano</button>
</div>

<div class="main">
  <!-- SIDEBAR: alumnos non colocados -->
  <div class="sidebar">
    <div class="sidebar-title">Alumnado</div>
    <div id="sidebar-alumnos"></div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
      <div class="sidebar-title">Info rápida</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:.65rem;color:var(--muted)">
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
          <input type="checkbox" id="show-notas" onchange="renderCanvas()" style="accent-color:var(--blue)"> Ver notas
        </label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
          <input type="checkbox" id="show-faltas" onchange="renderCanvas()" style="accent-color:var(--red)"> Ver faltas
        </label>
        <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
          <input type="checkbox" id="show-puntos" onchange="renderCanvas()" style="accent-color:var(--gold)"> Ver puntos
        </label>
      </div>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-wrap">
    <div class="canvas-toolbar">
      <button class="btn btn-ghost btn-sm" onclick="engadirMesa()">＋ Mesa</button>
      <button class="btn btn-blue btn-sm" onclick="abrirDistribuirGrupos()" style="background:rgba(96,165,250,.2);color:var(--blue,#60a5fa);border-color:rgba(96,165,250,.4)">👥 Crear grupos</button>
      <button class="btn btn-ghost btn-sm" onclick="distribuir5x4()" style="background:rgba(167,139,250,.15);color:#a78bfa;border:1.5px solid rgba(167,139,250,.4)">5×4+1×5</button>
      <button class="btn btn-ghost btn-sm" onclick="distribuirAutomatico()">🔀 Aleatorio</button>
      <button class="btn btn-ghost btn-sm" onclick="limparPlan()">🗑 Limpar</button>
      <button class="btn btn-gold btn-sm" onclick="gardar()">💾 Gardar</button>
      <span id="plan-nome-display" style="font-size:.75rem;color:var(--muted);margin-left:8px"></span>
    </div>
    <div class="canvas" id="canvas" 
      ondragover="e=>e.preventDefault()" 
      ondrop="canvasDrop(event)">
    </div>
  </div>
</div>

<!-- MODAL NOVO PLAN -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal-content"></div>
</div>

<script>
// ── STORAGE ───────────────────────────────────────────────────────────────────
const LS = {
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

// ── DATOS ─────────────────────────────────────────────────────────────────────
let alumnos = LS.get('pc_alumnos', []);
// plans = [{id, nome, mesas:[{id,x,y,alumno}]}]
let plans = LS.get('pa_plans', []);
let selPlanId = LS.get('pa_sel', null);

// Avatar colors (same as panel_clase)
const AVCOLS = ['#3b82f6','#22c55e','#f97316','#a78bfa','#f472b6','#2dd4bf',
                 '#fb923c','#34d399','#818cf8','#e879f9','#38bdf8','#4ade80',
                 '#facc15','#f87171','#60a5fa','#a3e635','#c084fc','#67e8f9',
                 '#fda4af','#86efac','#93c5fd','#d8b4fe','#6ee7b7','#fde68a','#fca5a5'];

function ac(i){ return AVCOLS[i % AVCOLS.length]; }
function ini(n){
  const m = n.match(/^(\d+)/);
  if(m) return m[1].substring(0,2);
  return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  // Ensure at least one plan
  if(!plans.length){
    plans = [{id:'plan_'+Date.now(), nome:'Plano 1', mesas:[]}];
    selPlanId = plans[0].id;
  }
  if(!selPlanId || !plans.find(p=>p.id===selPlanId)){
    selPlanId = plans[0].id;
  }
  renderPlansTabs();
  renderSidebar();
  renderCanvas();
  aplicarModo(LS.get('pa_modo','escuro'));
}

// ── PLANS ─────────────────────────────────────────────────────────────────────
function getPlan(){ return plans.find(p=>p.id===selPlanId) || plans[0]; }

function renderPlansTabs(){
  const bar = document.getElementById('plans-bar');
  const novoBtm = bar.querySelector('.btn-blue');
  bar.querySelectorAll('.plan-tab-wrap').forEach(t=>t.remove());

  plans.forEach((p, pi)=>{
    const isActive = p.id === selPlanId;

    // Wrapper
    const wrap = document.createElement('div');
    wrap.className = 'plan-tab-wrap';
    wrap.style.cssText = 'display:flex;align-items:center;gap:0;position:relative';

    // Main tab button
    const btn = document.createElement('button');
    btn.className = 'plan-tab' + (isActive?' active':'');
    btn.style.borderRadius = '8px 0 0 8px';
    btn.style.paddingRight = '6px';
    btn.textContent = p.nome;
    btn.onclick = () => {
      selPlanId = p.id;
      LS.set('pa_sel', selPlanId);
      renderPlansTabs(); renderSidebar(); renderCanvas();
    };

    // Edit button
    const editBtn = document.createElement('button');
    editBtn.title = 'Renomear';
    editBtn.style.cssText = 'height:28px;width:24px;border:1.5px solid var(--border2);border-left:none;background:'+(isActive?'rgba(245,158,11,.2)':'transparent')+';color:'+(isActive?'var(--gold)':'var(--muted)')+';cursor:pointer;font-size:.72rem;display:flex;align-items:center;justify-content:center;transition:all .15s';
    editBtn.textContent = '✏️';
    editBtn.onclick = (e) => { e.stopPropagation(); renomearPlanIdx(pi); };
    editBtn.onmouseover = function(){ this.style.color='var(--gold)'; };
    editBtn.onmouseout  = function(){ this.style.color=isActive?'var(--gold)':'var(--muted)'; };

    // Delete button
    const delBtn = document.createElement('button');
    delBtn.title = 'Borrar plano';
    delBtn.style.cssText = 'height:28px;width:24px;border:1.5px solid var(--border2);border-left:none;border-radius:0 8px 8px 0;background:'+(isActive?'rgba(239,68,68,.1)':'transparent')+';color:'+(isActive?'#ef4444':'var(--muted)')+';cursor:pointer;font-size:.72rem;display:flex;align-items:center;justify-content:center;transition:all .15s';
    delBtn.textContent = '🗑';
    delBtn.onclick = (e) => { e.stopPropagation(); borrarPlanIdx(pi); };
    delBtn.onmouseover = function(){ this.style.color='#ef4444'; };
    delBtn.onmouseout  = function(){ this.style.color=isActive?'#ef4444':'var(--muted)'; };

    wrap.appendChild(btn);
    wrap.appendChild(editBtn);
    wrap.appendChild(delBtn);
    bar.insertBefore(wrap, novoBtm);
  });

  const pl = getPlan();
  const disp = document.getElementById('plan-nome-display');
  if(disp) disp.textContent = pl ? pl.nome : '';
}

// Safe idx-based wrappers (avoid string interpolation in onclick)
function renomearPlanIdx(idx){
  const p = plans[idx];
  if(!p) return;
  renomearPlan(p.id);
}
function borrarPlanIdx(idx){
  const p = plans[idx];
  if(!p) return;
  borrarPlan(p.id);
}

function novoPlan(){
  openModal(`<h3>➕ Novo plano</h3>
    <input class="inp" id="m-nome" placeholder="Nome do plano (ex: Traballo en grupo)" autofocus/>
    <div class="modal-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-gold" onclick="crearPlan()">Crear</button>
    </div>`);
  setTimeout(()=>document.getElementById('m-nome')?.focus(),100);
}

function crearPlan(){
  const nome = document.getElementById('m-nome')?.value.trim();
  if(!nome) return;
  const plan = {id:'plan_'+Date.now(), nome, mesas:[]};
  plans.push(plan);
  selPlanId = plan.id;
  gardar();
  closeModal();
  renderPlansTabs();
  renderSidebar();
  renderCanvas();
}

function renomearPlan(id){
  const plan = plans.find(p=>p.id===id);
  if(!plan) return;
  const pi = plans.indexOf(plan);
  // Store current editing id safely
  window._editingPlanId = id;
  openModal('<h3>✏️ Editar plano</h3>'
    +'<label style="font-size:.62rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:4px;margin-top:8px">Nome</label>'
    +'<input class="inp" id="m-nome2" value="'+plan.nome.replace(/"/g,'&quot;')+'"/>'
    +'<div class="modal-row">'
    +'<button class="btn btn-red btn-sm" onclick="borrarPlan(window._editingPlanId)">🗑 Borrar</button>'
    +'<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-gold" onclick="aplicarRenome(window._editingPlanId)">💾 Gardar</button>'
    +'</div>');
  setTimeout(()=>document.getElementById('m-nome2')?.focus(),100);
}

function aplicarRenome(id){
  const plan = plans.find(p=>p.id===id);
  if(!plan) return;
  const v = document.getElementById('m-nome2')?.value.trim();
  if(v) plan.nome = v;
  gardar(); closeModal(); renderPlansTabs();
}

function borrarPlan(id){
  if(plans.length<=1){alert('Debe haber polo menos un plano.');return;}
  if(!confirm('Eliminar este plano?')) return;
  plans = plans.filter(p=>p.id!==id);
  selPlanId = plans[0].id;
  gardar(); closeModal(); renderPlansTabs(); renderSidebar(); renderCanvas();
}

// ── CANVAS ───────────────────────────────────────────────────────────────────
function renderCanvas(){
  const canvas = document.getElementById('canvas');
  const plan = getPlan();
  if(!plan){ canvas.innerHTML=''; return; }

  // Migrate old format
  plan.mesas.forEach(m=>migrarMesa(m));

  // Read optional info
  const showNotas  = document.getElementById('show-notas')?.checked;
  const showFaltas = document.getElementById('show-faltas')?.checked;
  const showPuntos = document.getElementById('show-puntos')?.checked;
  const notas  = showNotas  ? LS.get('sn3_notas',[])  : [];
  const asist  = showFaltas ? LS.get('pc_asist',{})   : {};
  const puntos = showPuntos ? LS.get('sp_puntos',{})  : {};

  function infoAl(al){
    let s='';
    if(!al) return s;
    if(showNotas){
      const ns=notas.filter(n=>n.alumno===al);
      if(ns.length){ const med=+(ns.reduce((a,n)=>a+n.valor,0)/ns.length).toFixed(1);
        const c2=med>=8?'#22c55e':med>=6?'#60a5fa':med>=4?'#f59e0b':'#ef4444';
        s+=`<span style="color:${c2};font-size:.5rem;font-weight:900">📒${med}</span>`; }
    }
    if(showFaltas){
      let f=0; Object.values(asist).forEach(d=>{['1','2','3','4','5'].forEach(ss=>{if((d[ss]||{})[al]==='ausente')f++;})});
      if(f) s+=`<span style="color:#ef4444;font-size:.5rem;font-weight:900">❌${f}</span>`;
    }
    if(showPuntos && puntos[al]!==undefined) s+=`<span style="color:var(--gold);font-size:.5rem;font-weight:900">⭐${puntos[al]}</span>`;
    return s;
  }

  function seatHTML(al, mesaId, seatIdx){
    const idx = alumnos.indexOf(al);
    const col = al ? ac(idx<0?0:idx) : 'rgba(255,255,255,.04)';
    const border = al ? `2px solid ${col}` : '1.5px dashed rgba(255,255,255,.12)';
    const info = infoAl(al);
    return `<div class="seat${al?'':' empty-seat'}"
      style="background:${col};border:${border};border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:3px;cursor:pointer;min-width:0;position:relative"
      ondragover="event.preventDefault();this.style.outline='2px solid var(--green)'"
      ondragleave="this.style.outline=''"
      ondrop="event.stopPropagation();seatDrop(event,'${mesaId}',${seatIdx});this.style.outline=''"
      onclick="seatClick('${mesaId}',${seatIdx})">
      ${al
        ? `<div style="width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:900;color:white;flex-shrink:0">${ini(al)}</div>
           <div style="font-size:.48rem;font-weight:800;text-align:center;line-height:1.1;overflow:hidden;max-width:100%;word-break:break-word">${al.replace(/^\d+\s*/,'').split(' ')[0]}</div>
           ${info?`<div style="display:flex;gap:1px;flex-wrap:wrap;justify-content:center">${info}</div>`:''}
           <span onclick="event.stopPropagation();quitarSeat('${mesaId}',${seatIdx})" style="position:absolute;top:1px;right:2px;font-size:.5rem;color:rgba(255,255,255,.4);cursor:pointer;opacity:0;transition:opacity .15s" class="seat-x">✕</span>`
        : `<div style="font-size:.8rem;opacity:.25">🪑</div>`}
    </div>`;
  }

  // Set canvas min size
  const maxX = plan.mesas.reduce((m,t)=>Math.max(m,t.x+(mesaDims(t.prazas||1).w)+20),400);
  const maxY = plan.mesas.reduce((m,t)=>Math.max(m,t.y+(mesaDims(t.prazas||1).h)+20),350);
  canvas.style.minWidth = maxX+'px';
  canvas.style.minHeight = maxY+'px';

  canvas.innerHTML = plan.mesas.map((mesa,mi) => {
    const dim = mesaDims(mesa.prazas||1);
    const seats = (mesa.alumnos||[]).map((al,si)=>seatHTML(al,mesa.id,si)).join('');
    const isEmpty = !(mesa.alumnos||[]).some(Boolean);

    return `<div class="mesa-group${isEmpty?' empty':''}" id="mesa-${mesa.id}"
      style="left:${mesa.x}px;top:${mesa.y}px;width:${dim.w}px;min-height:${dim.h}px;
             display:grid;grid-template-columns:repeat(${dim.cols},1fr);gap:4px;
             padding:6px;position:absolute;background:var(--card);
             border:2px solid var(--border2);border-radius:12px;
             cursor:grab;user-select:none;box-sizing:border-box"
      draggable="true"
      ondragstart="mesaDragStart(event,'${mesa.id}')"
      ondragover="event.preventDefault()"
      ondrop="canvasDrop(event)"
      onmousedown="startMoveMesa(event,'${mesa.id}')">
      <div style="position:absolute;top:2px;left:5px;font-size:.45rem;color:var(--muted);font-weight:700">${mi+1}</div>
      ${mesa.nome?`<div ondblclick="event.stopPropagation();renomearMesa('${mesa.id}')" title="Doble clic para renomear" style="position:absolute;top:2px;left:50%;transform:translateX(-50%);font-size:.5rem;color:var(--gold);font-weight:900;white-space:nowrap;cursor:pointer">${mesa.nome}</div>`:''}
      <span class="mesa-x" onclick="event.stopPropagation();borrarMesaGrupo('${mesa.id}')"
        style="position:absolute;top:1px;right:4px;font-size:.6rem;color:var(--muted);cursor:pointer;opacity:0;transition:opacity .15s">✕</span>
      ${seats}
    </div>`;
  }).join('');

  // Show seat-x on hover
  canvas.querySelectorAll('.mesa-group').forEach(mg=>{
    mg.addEventListener('mouseenter',()=>{
      mg.querySelector('.mesa-x').style.opacity='.7';
      mg.querySelectorAll('.seat-x').forEach(x=>x.style.opacity='.7');
    });
    mg.addEventListener('mouseleave',()=>{
      mg.querySelector('.mesa-x').style.opacity='0';
      mg.querySelectorAll('.seat-x').forEach(x=>x.style.opacity='0');
    });
  });

  canvas.ondragover = e=>e.preventDefault();
  canvas.ondrop = canvasDrop;
}

// ── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(){
  const plan = getPlan();
  plan?.mesas?.forEach(m=>migrarMesa(m));
  const placed = new Set((plan?.mesas||[]).flatMap(m=>m.alumnos||[]).filter(Boolean));
  const sid = document.getElementById('sidebar-alumnos');
  if(!alumnos.length){
    sid.innerHTML='<div style="font-size:.7rem;color:var(--muted)">Sen alumnado configurado</div>';
    return;
  }
  sid.innerHTML = alumnos.map((a,i)=>{
    const isPlaced = placed.has(a);
    return `<div class="alumno-chip${isPlaced?' placed':''}" id="chip-${i}"
      draggable="true"
      ondragstart="chipDragStart(event,'${a.replace(/'/g,"\\'")}')">
      <div class="av" style="background:${ac(i)}">${ini(a)}</div>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a}</span>
      ${isPlaced?'<span style="margin-left:auto;font-size:.6rem;opacity:.5">✓</span>':''}
    </div>`;
  }).join('');
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
let draggingAlumno = null;
let draggingMesaId = null;

function chipDragStart(e, alumno){
  draggingAlumno = alumno;
  draggingMesaId = null;
  e.dataTransfer.effectAllowed = 'move';
}

function mesaDragStart(e, mesaId){
  // Dragging a mesa to reassign its alumno, or move the mesa
  draggingMesaId = mesaId;
  draggingAlumno = null;
  e.dataTransfer.effectAllowed = 'move';
}

function mesaDrop(e, targetMesaId){
  // Kept for backward compat - handled by seatDrop and canvasDrop now
  e.preventDefault();e.stopPropagation();
}

function canvasDrop(e){
  e.preventDefault();
  document.querySelectorAll('.mesa').forEach(m=>m.classList.remove('drag-over'));
  // Only handle dropping a mesa to move it (position)
  if(!draggingMesaId) return;
  const canvas = document.getElementById('canvas');
  const rect = canvas.getBoundingClientRect();
  const plan = getPlan();
  const mesa = plan.mesas.find(m=>m.id===draggingMesaId);
  if(!mesa) return;
  const rawX = Math.max(0, e.clientX - rect.left - 45);
  const rawY = Math.max(0, e.clientY - rect.top - 35);
  mesa.x = Math.round(rawX / 20) * 20;
  mesa.y = Math.round(rawY / 20) * 20;
  draggingMesaId=null;
  gardar(); renderCanvas();
}

// ── MOVE MESA (mouse drag for repositioning) ──────────────────────────────────
let movingMesa=null, moveOffX=0, moveOffY=0;

function startMoveMesa(e, mesaId){
  // Only start move on right-click or with Alt key
  if(!e.altKey && e.button!==2) return;
  e.preventDefault();
  movingMesa = mesaId;
  const el = document.getElementById('mesa-'+mesaId);
  const plan = getPlan();
  const mesa = plan.mesas.find(m=>m.id===mesaId);
  moveOffX = e.clientX - mesa.x - document.querySelector('.canvas-wrap').scrollLeft;
  moveOffY = e.clientY - mesa.y - document.querySelector('.canvas-wrap').scrollTop;
  document.onmousemove = moveMesa;
  document.onmouseup = stopMoveMesa;
}

function moveMesa(e){
  if(!movingMesa) return;
  const plan = getPlan();
  const mesa = plan.mesas.find(m=>m.id===movingMesa);
  if(!mesa) return;
  const wrap = document.querySelector('.canvas-wrap');
  let rawX = Math.max(0, e.clientX - moveOffX + wrap.scrollLeft);
  let rawY = Math.max(0, e.clientY - moveOffY + wrap.scrollTop);
  // Snap to 20px grid
  mesa.x = Math.round(rawX / 20) * 20;
  mesa.y = Math.round(rawY / 20) * 20;
  const el = document.getElementById('mesa-'+movingMesa);
  if(el){ el.style.left=mesa.x+'px'; el.style.top=mesa.y+'px'; }
}

function stopMoveMesa(){
  if(movingMesa){ gardar(); renderCanvas(); }
  movingMesa=null;
  document.onmousemove=null; document.onmouseup=null;
}

function confirmarDistribuir(prazas){
  const criterio = document.getElementById('dist-criterio')?.value || 'aleatorio';
  const limpar   = document.getElementById('dist-limpar')?.checked !== false;
  closeModalDirect();

  const plan = getPlan();
  if(limpar) plan.mesas = [];

  // Order alumnos by criterio
  let ordered = [...alumnos];
  if(criterio === 'aleatorio'){
    ordered = ordered.sort(()=>Math.random()-.5);
  } else if(criterio === 'lista'){
    // already in order
  } else if(criterio === 'mixto'){
    // Load notas, sort by media, interleave high+low
    const notas = JSON.parse(localStorage.getItem('sn3_notas')||'[]');
    const medias = ordered.map(al=>{
      const ns = notas.filter(n=>n.alumno===al);
      const med = ns.length ? ns.reduce((s,n)=>s+n.valor,0)/ns.length : 5;
      return {al, med};
    }).sort((a,b)=>b.med-a.med);
    // Interleave: take from top and bottom alternately
    const top=[], bot=[];
    medias.forEach((m,i)=>{ if(i<medias.length/2) top.push(m.al); else bot.unshift(m.al); });
    ordered=[];
    const maxL=Math.max(top.length,bot.length);
    for(let i=0;i<maxL;i++){ if(top[i])ordered.push(top[i]); if(bot[i])ordered.push(bot[i]); }
  }

  // Create mesas
  const nGrupos = Math.ceil(ordered.length / prazas);
  const dim = mesaDims(prazas);
  const cols = Math.min(nGrupos, Math.floor(800/(dim.w+16)));

  for(let g=0;g<nGrupos;g++){
    const col = g % cols;
    const row = Math.floor(g / cols);
    const grupoAlumnos = ordered.slice(g*prazas, g*prazas+prazas);
    const seats = Array(prazas).fill(null).map((_,i)=>grupoAlumnos[i]||null);
    plan.mesas.push({
      id:'m_'+Date.now()+'_'+g,
      x: 20 + col*(dim.w+16),
      y: 20 + row*(dim.h+16),
      prazas,
      alumnos: seats,
      nome: nGrupos>1 ? String.fromCharCode(65+g) : '',
    });
  }

  gardar(); renderSidebar(); renderCanvas();

  // Toast
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#22c55e;color:white;padding:10px 20px;border-radius:12px;font-weight:800;font-size:.85rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3)';
  t.textContent=`✅ ${nGrupos} grupos de ${prazas} prazas creados`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function mesaDims(prazas){
  // Returns {w, h, cols, rows} for a given number of seats
  if(prazas===1) return {w:90,  h:70,  cols:1, rows:1};
  if(prazas===2) return {w:180, h:70,  cols:2, rows:1};
  if(prazas===3) return {w:270, h:70,  cols:3, rows:1};
  if(prazas===4) return {w:180, h:130, cols:2, rows:2};
  if(prazas===6) return {w:270, h:130, cols:3, rows:2};
  if(prazas===8) return {w:360, h:130, cols:4, rows:2};
  return {w:90+Math.ceil(prazas/2)*90-90, h:prazas>1?130:70, cols:Math.ceil(prazas/2), rows:Math.min(2,prazas)};
}

function migrarMesa(m){
  // Backward compat: {alumno} → {prazas:1, alumnos:[alumno]}
  if(!m.prazas){
    m.prazas = 1;
    m.alumnos = [m.alumno||null];
    delete m.alumno;
  }
  if(!m.alumnos) m.alumnos = Array(m.prazas).fill(null);
  while(m.alumnos.length < m.prazas) m.alumnos.push(null);
  return m;
}

function quitarAlumno(mesaId){
  borrarMesaGrupo(mesaId);
}

function limparPlan(){
  if(!confirm('Limpar todas as mesas deste plano?')) return;

  if(confirm('Eliminar todas as mesas? (Cancelar = só vaciar as prazas)'))
    plan.mesas = [];
  else
    plan.mesas.forEach(m=>{ m.alumnos=Array(m.prazas||1).fill(null); });

}

function distribuir5x4(){
  const plan = getPlan();
  if(!alumnos.length){ alert('Sen alumnado configurado.'); return; }
  if(plan.mesas.length && !confirm('Isto substituirá as mesas actuais por 5 grupos de 4 e 1 grupo de 5. Continuar?')) return;

  plan.mesas = [];

  // Grella: 3 columnas, 2 filas
  // Fila 0: grupos 0,1,2 (4 prazas cada un)
  // Fila 1: grupos 3,4 (4 prazas) + grupo 5 (5 prazas)
  const config = [4, 4, 4, 4, 4, 5];
  const COLS    = 3;
  const CELL_W  = 200;  // ancho de celda da grella (con marxe interna)
  const CELL_H  = 160;  // alto de celda da grella (con marxe interna)
  const MARGIN  = 20;   // marxe exterior

  config.forEach((prazas, gi) => {
    const col = gi % COLS;
    const row = Math.floor(gi / COLS);
    const x   = MARGIN + col * CELL_W;
    const y   = MARGIN + row * CELL_H;
    plan.mesas.push({
      id: 'm_' + (Date.now() + gi),
      x, y, prazas,
      alumnos: Array(prazas).fill(null)
    });
  });

  // Distribuír aleatoriamente
  const shuffled = [...alumnos].sort(() => Math.random() - .5);
  let si = 0;
  plan.mesas.forEach(m => {
    migrarMesa(m);
    for(let j = 0; j < m.prazas; j++){
      m.alumnos[j] = shuffled[si] || null;
      si++;
    }
  });

  gardar(); renderSidebar(); renderCanvas();

  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#a78bfa;color:white;padding:10px 20px;border-radius:12px;font-weight:800;font-size:.85rem;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3)';
  t.textContent = '✅ 6 grupos: 5×4 + 1×5 (25 alumnos/as)';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function distribuirAutomatico(){
  const plan = getPlan();
  if(!alumnos.length){ alert('Sen alumnado configurado.'); return; }
  // Ensure enough mesas
  // Count total seats; add individual mesas if not enough
  const totalSeats = plan.mesas.reduce((s,m)=>s+(m.prazas||1),0);
  if(totalSeats < alumnos.length){
    let extra = alumnos.length - totalSeats;
    while(extra > 0){
      const n = plan.mesas.length;
      const cols = Math.ceil(Math.sqrt(alumnos.length));
      const dim2=mesaDims(1);
      plan.mesas.push({id:'m_'+Date.now()+'_'+n,
        x:20+(n%cols)*(dim2.w+14), y:20+Math.floor(n/cols)*(dim2.h+14),
        prazas:1, alumnos:[null]});
      extra--;
    }
  }
  // Shuffle alumnos randomly
  const shuffled = [...alumnos].sort(()=>Math.random()-.5);
  plan.mesas.forEach((m,i)=>{
    migrarMesa(m);
    const start = plan.mesas.slice(0,i).reduce((s,pm)=>s+(pm.prazas||1),0);
    for(let j=0;j<(m.prazas||1);j++) m.alumnos[j]=shuffled[start+j]||null;
  });
  gardar(); renderSidebar(); renderCanvas();
}

// ── SEAT INTERACTIONS ─────────────────────────────────────────────────────────
function seatDrop(e, mesaId, seatIdx){
  e.preventDefault();
  const plan = getPlan();
  const mesa = plan.mesas.find(m=>m.id===mesaId);
  if(!mesa) return;

  if(draggingAlumno !== null){
    // Remove from any other seat first
    plan.mesas.forEach(m=>{ m.alumnos=m.alumnos.map(a=>a===draggingAlumno?null:a); });
    mesa.alumnos[seatIdx] = draggingAlumno;
  } else if(draggingMesaId && draggingMesaId !== mesaId){
    // Swap with source seat (seat 0 of source)
    const src = plan.mesas.find(m=>m.id===draggingMesaId);
    if(src){
      const tmp = mesa.alumnos[seatIdx];
      mesa.alumnos[seatIdx] = src.alumnos[0];
      src.alumnos[0] = tmp;
    }
  }
  draggingAlumno=null; draggingMesaId=null;
  gardar(); renderSidebar(); renderCanvas();
}

function seatClick(mesaId, seatIdx){
  // If dragging, do nothing. Otherwise open alumno picker if seat empty
  const plan = getPlan();
  const mesa = plan.mesas.find(m=>m.id===mesaId);
  if(!mesa) return;
  const al = mesa.alumnos[seatIdx];
  if(al) return; // already has someone

  // Show picker: unplaced alumnos
  const placed = new Set(plan.mesas.flatMap(m=>m.alumnos).filter(Boolean));
  const unplaced = alumnos.filter(a=>!placed.has(a));
  if(!unplaced.length){ return; }

  openModal(`<h3 style="margin-bottom:10px">👤 Asignar alumno/a</h3>
    <div style="display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto">
      ${unplaced.map((a,i)=>{
        const idx=alumnos.indexOf(a);
        return `<div onclick="asignarSeat('${mesaId}',${seatIdx},'${a.replace(/'/g,"\\'")}');closeModalDirect()"
          style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:9px;cursor:pointer;border:1px solid var(--border);background:var(--card2);font-size:.8rem;font-weight:800">
          <div style="width:24px;height:24px;border-radius:50%;background:${ac(idx)};display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:900;color:white">${ini(a)}</div>
          ${a}
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:10px">
      <button onclick="closeModalDirect()" class="btn btn-ghost btn-sm">Cancelar</button>
    </div>`);
}

function asignarSeat(mesaId, seatIdx, alumno){
  const plan = getPlan();
  const mesa = plan.mesas.find(m=>m.id===mesaId);
  if(!mesa) return;
  // Remove from other seat if placed
  plan.mesas.forEach(m=>{ m.alumnos=m.alumnos.map(a=>a===alumno?null:a); });
  mesa.alumnos[seatIdx] = alumno;
  gardar(); renderSidebar(); renderCanvas();
}

function quitarSeat(mesaId, seatIdx){
  const plan = getPlan();
  const mesa = plan.mesas.find(m=>m.id===mesaId);
  if(!mesa) return;
  mesa.alumnos[seatIdx] = null;
  gardar(); renderSidebar(); renderCanvas();
}

function borrarMesaGrupo(mesaId){
  const plan = getPlan();
  plan.mesas = plan.mesas.filter(m=>m.id!==mesaId);
  gardar(); renderSidebar(); renderCanvas();
}

function exportarJSON(){

  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));
  a.download='plano_aula_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
}

function importarJSON(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.pa_plans){plans=data.pa_plans;selPlanId=data.pa_sel||plans[0]?.id;}
        gardar();init();
      }catch(ex){alert('Erro: '+ex.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function openModal(h){
  document.getElementById('modal-content').innerHTML=h;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('modal-bg'))return;
  document.getElementById('modal-bg').classList.remove('show');
}
function closeModalDirect(){
  document.getElementById('modal-bg')?.classList.remove('show');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal-bg').classList.remove('show');});

// ── MODO CLARO/ESCURO ─────────────────────────────────────────────────────────
function toggleModo(){
  const a=LS.get('pa_modo','escuro');
  const n=a==='escuro'?'claro':'escuro';
  aplicarModo(n);LS.set('pa_modo',n);
}
function aplicarModo(m){
  const r=document.documentElement.style;
  const btn=document.getElementById('btn-modo');
  if(m==='claro'){
    r.setProperty('--bg','#f0f4f8');r.setProperty('--card','#ffffff');
    r.setProperty('--card2','#f5f8fb');r.setProperty('--border','rgba(15,23,42,.10)');
    r.setProperty('--border2','rgba(15,23,42,.18)');r.setProperty('--white','#1e293b');
    r.setProperty('--muted','rgba(30,41,59,.50)');
    if(btn)btn.textContent='🌙 Escuro';
  } else {
    r.setProperty('--bg','#0f172a');r.setProperty('--card','#1e293b');
    r.setProperty('--card2','#263347');r.setProperty('--border','rgba(255,255,255,.08)');
    r.setProperty('--border2','rgba(255,255,255,.14)');r.setProperty('--white','#f1f5f9');
    r.setProperty('--muted','rgba(241,245,249,.45)');
    if(btn)btn.textContent='☀️ Claro';
  }
}

init();

function exportarCSVPlan(){
  const p=getPlan();
  if(!p){alert('Selecciona un plano primeiro');return;}
  const rows=[['Alumno/a','Grupo','Fila','Columna','Notas','Puntos']];
  (p.asignacions||[]).forEach(a=>rows.push([a.alumno||'',a.grupo||'',a.fila||'',a.col||'',a.notas||'',a.puntos||'']));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const el=document.createElement('a');
  el.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  el.download='plano_'+p.nome.replace(/\s/g,'_')+'_'+new Date().toISOString().split('T')[0]+'.csv';
  el.click();
}

// ── CONFIG DOCENTE ──────────────────────────────────────────────────────────
function _getConf() {
  try { var v = localStorage.getItem('sn3_config'); return v ? JSON.parse(v) : {}; } catch(e) { return {}; }
}
function _aplicarCabeceira() {
  var c = _getConf();
  var parts = [];
  if (c.docente) parts.push(c.docente);
  if (c.grupo) parts.push(c.grupo);
  if (c.curso) parts.push(c.curso);
  var t = document.getElementById('_hdr-info');
  if (t) {
    if (parts.length) {
      t.textContent = parts.join(' · ');
      t.style.display = 'block';
    } else {
      t.style.display = 'none';
    }
  }
}

_aplicarCabeceira();
