<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#263347;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--white:#f1f5f9;--muted:rgba(241,245,249,.45);--gold:#fbbf24;--green:#22c55e;--red:#ef4444;--blue:#60a5fa;--shadow:0 4px 24px rgba(0,0,0,.4);}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header h1{font-family:'DM Serif Display',Georgia,serif;font-size:1.1rem;color:var(--gold)}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{height:32px;padding:0 14px;border:none;border-radius:9px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:800;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--white);border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,.13)}
.btn-gold{background:var(--gold);color:#0f172a}
.tabs{display:flex;gap:4px;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{height:30px;padding:0 14px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-size:.75rem;font-weight:800;cursor:pointer;white-space:nowrap;font-family:'DM Sans',sans-serif;transition:all .15s}
.tab.active{background:var(--gold);color:#0f172a;border-color:var(--gold)}
.layout{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 96px)}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:12px;overflow-y:auto}
.sidebar-title{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;padding:0 4px}
.al-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:10px;cursor:pointer;transition:background .12s;margin-bottom:2px}
.al-item:hover{background:var(--card2)}
.al-item.sel{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2)}
.al-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;color:white;flex-shrink:0}
.al-name{font-size:.78rem;font-weight:800}
.al-mini-bars{display:flex;gap:2px;align-items:flex-end;margin-top:2px}
.al-mini-bar{width:5px;border-radius:1px;transition:height .3s}
.main{padding:20px;overflow-y:auto}
.comp-card{background:var(--card);border-radius:14px;border:2px solid var(--border);padding:16px;margin-bottom:12px;transition:border-color .2s}
.comp-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.comp-icon{font-size:1.4rem;flex-shrink:0}
.comp-info{flex:1}
.comp-code{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.comp-name{font-size:.88rem;font-weight:800;margin-top:1px}
.comp-desc{font-size:.7rem;color:var(--muted);margin-top:2px;line-height:1.4}
/* Escala botóns */
.escala-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.esc-btn{height:36px;min-width:36px;padding:0 10px;border-radius:10px;border:2px solid transparent;cursor:pointer;font-size:.75rem;font-weight:800;font-family:'DM Sans',sans-serif;transition:all .15s;background:rgba(255,255,255,.04);color:var(--muted)}
.esc-btn:hover{transform:scale(1.05)}
.esc-btn.sel{transform:scale(1.08)}
/* Barra global */
.global-bar{background:var(--card2);border-radius:12px;padding:12px 16px;margin-bottom:16px;border:1px solid var(--border)}
.radar-wrap{display:flex;justify-content:center;margin:10px 0}
/* Selector de materia para asignación */
.asign-chip{font-size:.65rem;font-weight:800;padding:2px 8px;border-radius:5px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.asign-chip.sel{border-color:var(--gold);color:var(--gold);background:rgba(251,191,36,.08)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:18px;padding:22px;width:480px;max-width:100%;border:1px solid var(--border2);max-height:90vh;overflow-y:auto}
.modal h3{font-family:'DM Serif Display',Georgia,serif;font-size:1.1rem;margin-bottom:12px;color:var(--gold)}
.inp{width:100%;height:36px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:700;padding:0 12px;outline:none;margin-bottom:8px}
.modal-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
body.claro{--bg:#f0f4f8;--card:#fff;--card2:#edf0fa;--border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);--white:#1e2a4a;--muted:rgba(30,42,74,.5)}
</style>

<body>
<div class="header">
  <span style="font-size:1.4rem">🎓</span>
  <div>
    <h1>Avaliación Competencial LOMLOE</h1>
    <div id="_hdr-info" style="display:none;font-size:.65rem;font-weight:700;color:var(--muted,rgba(238,242,255,.45));margin-top:2px"></div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-ghost" onclick="openAsignacion()">🔗 Asignar materias</button>
    <button class="btn btn-ghost" onclick="exportarInforme()">🖨️ Informe PDF</button>
    <button class="btn btn-ghost" onclick="exportarCSV()">📊 CSV</button>
    <button class="btn btn-ghost" onclick="toggleModo()" id="btn-modo">☀️ Claro</button>
    <a href="PORTAL_DOCENTE.html" class="btn btn-ghost" style="text-decoration:none" title="Configuración docente">⚙️</a>

  </div>
</div>
<div class="tabs">
  <button class="tab active" id="tab-alumno" onclick="setTab('alumno')">👤 Por alumno/a</button>
  <button class="tab" id="tab-clase" onclick="setTab('clase')">🏫 Vista clase</button>
  <button class="tab" id="tab-asign" onclick="setTab('asign')">🔗 Asignacións</button>
  <button class="tab" id="tab-uds" onclick="setTab('uds')">📚 Programación UD</button>
</div>
<div class="layout">
  <div class="sidebar">
    <input style="width:100%;height:30px;background:var(--card2);border:1px solid var(--border2);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:.72rem;padding:0 8px;outline:none;margin-bottom:10px" id="search" placeholder="🔍 Buscar..." oninput="renderAlList()">
    <div class="sidebar-title">Alumnado</div>
    <div id="al-list"></div>
  </div>
  <div class="main" id="main">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;color:var(--muted)">
      <span style="font-size:2.5rem">🎓</span>
      <span style="font-size:.85rem">Selecciona un alumno/a para avaliar as competencias LOMLOE</span>
    </div>
  </div>
</div>
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)"><div class="modal" id="modal-content"></div></div>

<script>
const LS={get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};
const AVCOLS=['#3b82f6','#22c55e','#f97316','#a78bfa','#f472b6','#2dd4bf','#fbbf24','#ef4444','#06b6d4','#84cc16'];
function ini(n){const m=n.match(/^(\d+)/);if(m)return m[1].substring(0,2);return n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}

// ── COMPETENCIAS LOMLOE (RD 157/2022) ────────────────────────────────────────
const COMPETENCIAS=[
  {id:'CCL',emoji:'📖',nome:'Competencia en comunicación lingüística',desc:'Expresarse e comprender en distintas linguas e contextos',col:'#3b82f6'},
  {id:'CP',emoji:'🌍',nome:'Competencia plurilingüe',desc:'Usar distintas linguas de forma apropiada e eficaz',col:'#06b6d4'},
  {id:'STEM',emoji:'🔬',nome:'Competencia matemática e en ciencia, tecnoloxía e enxeñaría',desc:'Aplicar o pensamento matemático e científico para resolver problemas',col:'#f97316'},
  {id:'CD',emoji:'💻',nome:'Competencia dixital',desc:'Utilizar dispositivos e ferramentas dixitais con criterio',col:'#8b5cf6'},
  {id:'CPSAA',emoji:'🧠',nome:'Competencia persoal, social e de aprender a aprender',desc:'Autorregularse, relacionarse e desenvolvemento do pensamento crítico',col:'#ec4899'},
  {id:'CC',emoji:'⚖️',nome:'Competencia cidadá',desc:'Participar en sociedade de forma activa, democrática e responsable',col:'#14b8a6'},
  {id:'CE',emoji:'💡',nome:'Competencia emprendedora',desc:'Desenvolver proxectos creativos con iniciativa e responsabilidade',col:'#fbbf24'},
  {id:'CCEC',emoji:'🎨',nome:'Competencia en conciencia e expresión cultural',desc:'Comprender e expresarse a través das artes e a cultura',col:'#a78bfa'},
];

const ESCALA=[
  {v:1,label:'Inicio',emoji:'1️⃣',col:'#ef4444'},
  {v:2,label:'Proceso',emoji:'2️⃣',col:'#f97316'},
  {v:3,label:'Acadado',emoji:'3️⃣',col:'#fbbf24'},
  {v:4,label:'Avanzado',emoji:'4️⃣',col:'#22c55e'},
];

// Datos gardados
let vals = LS.get('lomloe_vals',{});      // {alumno: {CCL: {v,nota,trim}, ...}}
let asignacions = LS.get('lomloe_asign',{}); // {matId: [competId, ...]}
let selAlumno = null;
let selTrim = 0;
const alumnos = LS.get('pc_alumnos',LS.get('sn3_alumnos',[]));
const materias = LS.get('sn3_materias',[]).filter(m=>m.id!=='outras');
const notas = LS.get('sn3_notas',[]);

function save(){LS.set('lomloe_vals',vals);try{localStorage.setItem('bbdd_last_backup',new Date().toISOString());}catch{}}

function getVal(al,compId){return (vals[al]||{})[selTrim+':'+compId]||null;}
function setVal(al,compId,v){
  if(!vals[al]) vals[al]={};
  if(v===null){delete vals[al][selTrim+':'+compId];}
  else vals[al][selTrim+':'+compId]={v,ts:new Date().toISOString(),trim:selTrim};
  save();updateAlList(al);
}

// Calcular media desde notas do caderno via asignacións
function calcMediaDesdeNotas(al, compId){
  const mats=Object.entries(asignacions).filter(([m,cs])=>cs.includes(compId)).map(([m])=>m);
  if(!mats.length) return null;
  const ns=notas.filter(n=>n.alumno===al&&mats.includes(n.materia)&&(!selTrim||n.trimestre===selTrim));
  if(!ns.length) return null;
  const esc=LS.get('sn3_escala',10);
  const media=ns.reduce((s,n)=>s+n.valor,0)/ns.length;
  // Converter escala 0-10 a 1-4
  const pct=media/esc;
  if(pct>=.88) return 4; if(pct>=.65) return 3; if(pct>=.45) return 2; return 1;
}

// ── RENDER LISTA ─────────────────────────────────────────────────────────────
function renderAlList(){
  const q=document.getElementById('search')?.value?.toLowerCase()||'';
  document.getElementById('al-list').innerHTML=alumnos.filter(a=>!q||a.toLowerCase().includes(q)).map((a,i)=>{
    const valsAl=Object.entries(vals[a]||{}).filter(([k])=>!selTrim||k.startsWith(selTrim+':')).map(([,v])=>v?.v).filter(Boolean);
    const media=valsAl.length?+(valsAl.reduce((s,v)=>s+v,0)/valsAl.length).toFixed(1):null;
    const col=media>=3.5?'#22c55e':media>=2.5?'#fbbf24':media>=1.5?'#f97316':media?'#ef4444':'#475569';
    return `<div class="al-item${selAlumno===a?' sel':''}" onclick="selAl('${a.replace(/'/g,"\\'")}')">
      <div class="al-avatar" style="background:${AVCOLS[i%AVCOLS.length]}">${ini(a)}</div>
      <div style="flex:1">
        <div class="al-name">${a}</div>
        ${media!==null?`<div style="font-size:.6rem;font-weight:900;color:${col}">${media}/4 · ${valsAl.length}/${COMPETENCIAS.length} avaliadas</div>`:'<div style="font-size:.6rem;color:var(--muted)">Sen avaliación</div>'}
      </div>
    </div>`;
  }).join('');
}
function updateAlList(al){renderAlList();}

function selAl(nome){selAlumno=nome;renderAlList();renderMain();}

// ── RENDER MAIN ───────────────────────────────────────────────────────────────
function renderEvolucionTrimestral(nome){
  const gc=v=>{if(!v)return'#94a3b8';return v>=3.5?'#22c55e':v>=2.5?'#60a5fa':v>=1.5?'#fbbf24':'#ef4444';};
  const trims=[1,2,3];
  const rows=COMPETENCIAS.map(c=>{
    const vals=trims.map(t=>{
      // Calcular nivel desta competencia neste trimestre
      const ns=LS.get('sn3_notas',[]).filter(n=>n.alumno===nome&&n.trimestre===t);
      if(!ns.length) return null;
      // Usar calcularCompetenciasDesdeUDs ou calcMediaDesdeNotas
      const auto=calcMediaDesdeNotas(nome,c.id,t);
      return auto;
    });
    const hasData=vals.some(v=>v!==null);
    if(!hasData) return '';
    const bars=vals.map((v,i)=>{
      const col=gc(v);
      const pct=v?Math.round(v/4*100):0;
      return `<div style="flex:1;text-align:center">
        <div style="font-size:.65rem;font-weight:900;color:${col};margin-bottom:3px">${v??'—'}</div>
        <div style="height:50px;background:rgba(255,255,255,.05);border-radius:4px 4px 0 0;overflow:hidden;display:flex;align-items:flex-end">
          <div style="width:100%;height:${pct}%;background:${col}88;border-radius:4px 4px 0 0;min-height:${v?2:0}px"></div>
        </div>
        <div style="font-size:.55rem;color:var(--muted);margin-top:3px">T${i+1}</div>
      </div>`;
    }).join('');
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:1.1rem">${c.emoji}</span>
      <span style="font-size:.72rem;font-weight:800;min-width:50px;color:${c.col}">${c.id}</span>
      <div style="display:flex;gap:6px;flex:1;align-items:flex-end">${bars}</div>
    </div>`;
  }).filter(Boolean).join('');

  openModal(`<h3>📈 Evolución trimestral · ${nome}</h3>
    <div style="max-height:420px;overflow-y:auto">${rows||'<div style="color:var(--muted);padding:2rem;text-align:center">Sen datos trimestrais. Asegúrate de que as notas teñen trimestre asignado.</div>'}</div>
    <div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn btn-ghost" onclick="closeModal()">Pechar</button></div>`);
}

function calcTendencia(nome,compId){
  // Calcular tendencia de T1→T2→T3
  const trims=[1,2,3];
  const vals=trims.map(t=>calcMediaDesdeNotas(nome,compId,t));
  const conVals=vals.filter(v=>v!==null);
  if(conVals.length<2) return null;
  // Regresión lineal simple
  const n=conVals.length;
  const xs=conVals.map((_,i)=>i+1);
  const ys=conVals;
  const sumX=xs.reduce((s,v)=>s+v,0);
  const sumY=ys.reduce((s,v)=>s+v,0);
  const sumXY=xs.reduce((s,x,i)=>s+x*ys[i],0);
  const sumX2=xs.reduce((s,x)=>s+x*x,0);
  const slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
  return {slope,last:ys[ys.length-1],trend:slope>0.3?'subindo':slope<-0.3?'baixando':'estable'};
}

function suxerirNivelTendencia(nome){
  const sugs=COMPETENCIAS.map(c=>{
    const tend=calcTendencia(nome,c.id);
    if(!tend) return null;
    const {slope,last,trend}=tend;
    const man=getVal(nome,c.id);
    const sugerido=tend.trend==='subindo'?Math.min(4,Math.ceil(last+0.5)):tend.trend==='baixando'?Math.max(1,Math.floor(last-0.3)):Math.round(last);
    const arrow=trend==='subindo'?'↗ Subindo':trend==='baixando'?'↘ Baixando':'→ Estable';
    const arrowCol=trend==='subindo'?'#22c55e':trend==='baixando'?'#ef4444':'#fbbf24';
    return {c,tend,sugerido,arrow,arrowCol,man};
  }).filter(Boolean);

  if(!sugs.length){showToast('Sen datos trimestrais para calcular tendencia','#f87171');return;}

  const rows=sugs.map(s=>`
    <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:1.1rem">${s.c.emoji}</span>
      <span style="font-size:.72rem;font-weight:800;color:${s.c.col};min-width:50px">${s.c.id}</span>
      <span style="font-size:.65rem;font-weight:900;color:${s.arrowCol}">${s.arrow}</span>
      <span style="font-size:.7rem;color:var(--muted)">Actual: <strong style="color:var(--white)">${s.man?.v||s.tend.last||'—'}/4</strong></span>
      <span style="font-size:.7rem;color:var(--indigo)">Suxestión: <strong>Nivel ${s.sugerido}/4</strong></span>
      <button onclick="aplicarSuxerencia('${s.c.id}',${s.sugerido},'${nome}')" style="height:22px;padding:0 9px;background:rgba(129,140,248,.12);border:1px solid rgba(129,140,248,.25);border-radius:6px;color:#818cf8;font-size:.6rem;font-weight:800;cursor:pointer;margin-left:auto">Aplicar</button>
    </div>`).join('');

  openModal(`<h3>🔮 Suxestión de niveis por tendencia · ${nome}</h3>
    <div style="font-size:.65rem;color:var(--muted);margin-bottom:10px">Baseado na evolución T1→T2→T3 de cada competencia</div>
    <div style="max-height:380px;overflow-y:auto">${rows}</div>
    <div class="modal-row">
      <button class="btn btn-gold" onclick="aplicarTodasSuxerencias(${JSON.stringify(sugs.map(s=>({id:s.c.id,v:s.sugerido}))).replace(/"/g,'&quot;')},'${nome}')">✓ Aplicar todas</button>
      <button class="btn btn-ghost" onclick="closeModal()">Pechar</button>
    </div>`);
}

function aplicarSuxerencia(compId,nivel,nome){
  setVal(nome,compId,nivel,'auto');
  showToast('✓ Nivel '+nivel+' aplicado a '+compId,'#34d399');
  closeModal();
  suxerirNivelTendencia(nome);
}

function aplicarTodasSuxerencias(sugsJson,nome){
  let sugs;
  try{sugs=typeof sugsJson==='string'?JSON.parse(sugsJson.replace(/&quot;/g,'"')):sugsJson;}catch{return;}
  sugs.forEach(s=>setVal(nome,s.id,s.v,'auto'));
  save();renderMain();
  showToast('✓ '+sugs.length+' niveis actualizados','#34d399');
  closeModal();
}

function renderMain(){
  if(!selAlumno) return;
  const nome=selAlumno;
  const idx=alumnos.indexOf(nome);
  const col=AVCOLS[idx%AVCOLS.length];
  setTimeout(()=>{
    const bExist=document.getElementById('btn-evo-trim');
    if(!bExist){const b=document.createElement('button');b.id='btn-evo-trim';b.textContent='📈 Evolución T';b.style.cssText='height:24px;padding:0 10px;border-radius:7px;border:1.5px solid var(--border2);background:transparent;color:var(--muted);font-size:.62rem;font-weight:800;cursor:pointer;font-family:\'DM Sans\',sans-serif;margin-left:6px';b.onclick=()=>renderEvolucionTrimestral(nome);
    const bt=document.createElement('button');bt.style.cssText='height:24px;padding:0 10px;border-radius:7px;border:1.5px solid rgba(129,140,248,.3);background:rgba(129,140,248,.08);color:#818cf8;font-size:.62rem;font-weight:800;cursor:pointer;font-family:\'DM Sans\',sans-serif;margin-left:4px';bt.textContent='🔮 Suxerir niveis';bt.onclick=()=>suxerirNivelTendencia(nome);
    const hdr=document.querySelector('#main h2')||document.querySelector('#main');if(hdr){hdr.after?hdr.after(b):hdr.parentNode.insertBefore(b,hdr.nextSibling);b.after?b.after(bt):b.parentNode.insertBefore(bt,b.nextSibling);}}
  },150);

  // KPIs
  const valsAl=COMPETENCIAS.map(c=>{
    const man=getVal(nome,c.id);
    const auto=calcMediaDesdeNotas(nome,c.id);
    return {c,v:man?.v||auto||null,man:!!man?.v};
  });
  const avaliadas=valsAl.filter(x=>x.v!==null).length;
  const mediaGl=avaliadas?+(valsAl.filter(x=>x.v).reduce((s,x)=>s+x.v,0)/avaliadas).toFixed(1):null;

  const trimSel=`<div style="display:flex;gap:5px;margin-bottom:16px">
    ${[{v:0,l:'Todos'},{v:1,l:'T1'},{v:2,l:'T2'},{v:3,l:'T3'}].map(t=>`

// ── RADAR SVG ─────────────────────────────────────────────────────────────────
function renderRadar(valsAl){
  const n=COMPETENCIAS.length, R=90, cx=130, cy=110;
  const pts=COMPETENCIAS.map((_,i)=>{
    const ang=-Math.PI/2+(2*Math.PI/n)*i;
    return {ax:cx+R*Math.cos(ang),ay:cy+R*Math.sin(ang)};
  });
  // Grid
  const grids=[1,2,3,4].map(lv=>{
    const r=R*lv/4;
    const poly=COMPETENCIAS.map((_,i)=>{const a=-Math.PI/2+(2*Math.PI/n)*i;return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');
    return `<polygon points="${poly}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="1"/>`;
  }).join('');
  // Axes
  const axes=pts.map(p=>`<line x1="${cx}" y1="${cy}" x2="${p.ax.toFixed(1)}" y2="${p.ay.toFixed(1)}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`).join('');
  // Labels
  const labels=COMPETENCIAS.map((c,i)=>{
    const p=pts[i];
    const tx=(cx+(R+18)*Math.cos(-Math.PI/2+(2*Math.PI/n)*i)).toFixed(1);
    const ty=(cy+(R+18)*Math.sin(-Math.PI/2+(2*Math.PI/n)*i)).toFixed(1);
    return `<text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="${c.col}" font-weight="800">${c.id}</text>`;
  }).join('');
  // Data polygon
  const dataPolygon=(()=>{
    const ps=valsAl.map((x,i)=>{
      const r=R*(x.v||0)/4;
      const a=-Math.PI/2+(2*Math.PI/n)*i;
      return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
    }).join(' ');
    return `<polygon points="${ps}" fill="rgba(251,191,36,.15)" stroke="#fbbf24" stroke-width="2"/>`;
  })();
  // Dots
  const dots=valsAl.map((x,i)=>{
    if(!x.v) return '';
    const r=R*x.v/4, a=-Math.PI/2+(2*Math.PI/n)*i;
    return `<circle cx="${(cx+r*Math.cos(a)).toFixed(1)}" cy="${(cy+r*Math.sin(a)).toFixed(1)}" r="4" fill="${x.c.col||'#fbbf24'}" stroke="var(--card)" stroke-width="2"/>`;
  }).join('');

  return `<div style="background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
    <svg width="260" height="220" viewBox="0 0 260 220" font-family="'DM Sans',sans-serif">
      ${grids}${axes}${labels}${dataPolygon}${dots}
    </svg>
    <div style="flex:1;min-width:180px">
      ${valsAl.map(x=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
        <span style="font-size:.65rem;font-weight:900;color:${x.c.col};min-width:44px">${x.c.id}</span>
        <div style="flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden">
          <div style="height:100%;width:${x.v?x.v/4*100:0}%;background:${x.c.col};border-radius:999px"></div>
        </div>
        <span style="font-size:.65rem;font-weight:900;color:${ESCALA.find(e=>e.v===x.v)?.col||'var(--muted)'};">${x.v?x.v+'/4':'\u2014'}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function toggleAsign(matId,compId,btn){
  if(!asignacions[matId]) asignacions[matId]=[];
  const idx=asignacions[matId].indexOf(compId);
  const comp=COMPETENCIAS.find(c=>c.id===compId);
  if(idx>=0){
    asignacions[matId].splice(idx,1);
    btn.classList.remove('sel');
    btn.style.cssText='';
  } else {
    asignacions[matId].push(compId);
    btn.classList.add('sel');
    btn.style.cssText=`border-color:${comp.col};color:${comp.col};background:${comp.col}10`;
  }
  LS.set('lomloe_asign',asignacions);
}

// Calcular competencias dun alumno/a a partir das notas + UDs programadas
function calcularCompetenciasDesdeUDs(al, trimOverride){
  const notas = LS.get('sn3_notas',[]).filter(n=>n.alumno===al);
  const escala = LS.get('sn3_escala',10);
  const resultado = {}; // {compId: {suma, peso_total, notas}}
  COMPETENCIAS.forEach(c=>{resultado[c.id]={suma:0,peso:0,notas:[]};});

  materias.forEach(mat=>{
    const udsMat = uds[mat.id] || [];
    // Notas desta materia
    const notasMat = notas.filter(n=>n.materia===mat.id&&(!trimOverride||n.trimestre===trimOverride));

    if(udsMat.length){
      // MODO DETALLADO: usar programación UD
      notasMat.forEach(nota=>{
        if(!nota.unidade) return;
        const ud = udsMat.find(u=>u.num===nota.unidade.num);
        if(!ud) return;
        // Calcular peso total dos contidos desta UD
        let pesTotal=0;
        ud.contidos.forEach(c=>{Object.values(c.comps).forEach(p=>{pesTotal+=p;});});
        if(!pesTotal) return;
        // Distribuir a nota entre as competencias segundo o peso
        ud.contidos.forEach(cont=>{
          Object.entries(cont.comps).forEach(([compId,pes])=>{
            if(!resultado[compId]) return;
            const pctComp=pes/pesTotal;
            resultado[compId].suma+=(nota.valor/escala)*4*pctComp*(nota.peso||1);
            resultado[compId].peso+=pctComp*(nota.peso||1);
            resultado[compId].notas.push({nota,cont,pct:pctComp});
          });
        });
      });
    } else {
      // MODO SINXELO: usar asignacións de materias
      const compsAsign = asignacions[mat.id] || [];
      if(!compsAsign.length){
        // Fallback: competencias por defecto da área
        const matNome=mat.nome||mat.id;
        const defKey=Object.keys(AREA_COMPS_DEFAULT).find(k=>matNome.includes(k.split(' ')[0]));
        if(!defKey) return;
        const defComps=AREA_COMPS_DEFAULT[defKey];
        notasMat.forEach(nota=>{
          let pesTot=Object.values(defComps).reduce((s,v)=>s+v,0);
          Object.entries(defComps).forEach(([cid,pes])=>{
            if(!resultado[cid]) return;
            const pctComp=pes/pesTot;
            resultado[cid].suma+=(nota.valor/escala)*4*pctComp*(nota.peso||1);
            resultado[cid].peso+=pctComp*(nota.peso||1);
          });
        });
      } else {
        const pesCad=1/compsAsign.length;
        notasMat.forEach(nota=>{
          compsAsign.forEach(cid=>{
            if(!resultado[cid]) return;
            resultado[cid].suma+=(nota.valor/escala)*4*pesCad*(nota.peso||1);
            resultado[cid].peso+=pesCad*(nota.peso||1);
          });
        });
      }
    }
  });

  // Calcular nivel resultante para cada competencia
  const niveis={};
  COMPETENCIAS.forEach(c=>{
    const r=resultado[c.id];
    if(r.peso>0) niveis[c.id]=Math.min(4,Math.max(1,+(r.suma/r.peso).toFixed(1)));
    else niveis[c.id]=null;
  });
  return niveis;
}

function importarProgramacionExt(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json';
  inp.onchange=async e=>{
    const file=e.target.files[0];
    if(!file) return;
    try{
      const text=await file.text();
      const data=JSON.parse(text);
      // Admitir formato exportado por esta app ou por importador_programacion
      const novasUDs=data.lomloe_uds||data.uds||null;
      const novasAsign=data.lomloe_asign||null;
      if(!novasUDs||typeof novasUDs!=='object'){
        alert('Formato non recoñecido. O ficheiro debe ter a clave "lomloe_uds".');return;
      }
      const nMats=Object.keys(novasUDs).length;
      const nUDs=Object.values(novasUDs).flat().length;
      _confirmar(
        `Importar programación? ${nMats} materia${nMats!==1?'s':''} · ${nUDs} UD${nUDs!==1?'s':''}. Sobreescribirá a programación actual das materias incluídas.`,
        ()=>{
          Object.assign(uds,novasUDs);
          saveUDs();
          if(novasAsign){
            const asign=LS.get('lomloe_asign',{});
            Object.assign(asign,novasAsign);
            LS.set('lomloe_asign',asign);
          }
          renderVistaUDs();
        },'Importar'
      );
    }catch(err){
      alert('Erro ao ler o ficheiro: '+err.message);
    }
  };
  inp.click();
}

function engadirCont(){
  const conts=window._udConts;
  conts.push({id:'c'+Date.now(),label:'',comps:{}});
  document.getElementById('conts-wrap').innerHTML=window._udRender(conts);
  document.getElementById('conts-wrap').addEventListener('input',e=>{
    const ci=parseInt(e.target.dataset.ci);
    if(e.target.classList.contains('cont-label')) conts[ci].label=e.target.value;
    if(e.target.classList.contains('comp-peso')){const k=e.target.dataset.comp;conts[ci].comps[k]=parseFloat(e.target.value)||0;}
  });
}
function eliminarCont(ci){
  if(!window._contBackups)window._contBackups=[];
  const eliminado=window._udConts[ci];
  window._udConts.splice(ci,1);
  document.getElementById('conts-wrap').innerHTML=window._udRender(window._udConts);
  _toastDesfacer(
    `Contido "${(eliminado.label||'sen título').substring(0,30)}" eliminado`,
    ()=>{
      window._udConts.splice(ci,0,eliminado);
      document.getElementById('conts-wrap').innerHTML=window._udRender(window._udConts);
    }
  );
}
function gardarUD(matId,isEdit){
  const num=parseInt(document.getElementById('ud-num')?.value);
  const tit=document.getElementById('ud-tit')?.value.trim()||'';
  if(!num){alert('Indica o número de UD.');return;}
  const conts=window._udConts.filter(c=>c.label.trim());
  if(!uds[matId]) uds[matId]=[];
  const idx=uds[matId].findIndex(u=>u.num===num);
  const entry={num,tit,contidos:conts};
  if(idx>=0) uds[matId][idx]=entry; else uds[matId].push(entry);
  uds[matId].sort((a,b)=>a.num-b.num);
  saveUDs();
  closeModal();
  renderVistaUDs();
  renderAlList();
}
function editarUD(matId,num){
  const mat=materias.find(m=>m.id===matId);
  const ud=(uds[matId]||[]).find(u=>u.num===num);
  if(ud&&mat) abrirFormUD(matId,mat.nome,ud);
}
function borrarUD(matId,num){
  const eliminada=(uds[matId]||[]).find(u=>u.num===num);
  if(!eliminada)return;
  uds[matId]=(uds[matId]||[]).filter(u=>u.num!==num);
  saveUDs();renderVistaUDs();
  const mat=materias.find(m=>m.id===matId);
  _toastDesfacer(
    `UD${num}${eliminada.tit?' · '+eliminada.tit:''} eliminada${mat?' de '+mat.nome:''}`,
    ()=>{
      if(!uds[matId])uds[matId]=[];
      uds[matId].push(eliminada);
      uds[matId].sort((a,b)=>a.num-b.num);
      saveUDs();renderVistaUDs();
    }
  );
}

  document.body.appendChild(ov);
  ov.querySelector('#_conf-si').onclick=()=>{ov.remove();onSi();};
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  document.addEventListener('keydown',function _esc(e){if(e.key==='Escape'){ov.remove();document.removeEventListener('keydown',_esc);}});
}

// ── TOAST DESFACER ────────────────────────────────────────────────────────────
function _toastDesfacer(msg,onDesfacer,durMs=5500){
  document.getElementById('_toast-desfacer')?.remove();
  const t=document.createElement('div');
  t.id='_toast-desfacer';
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);'
    +'background:var(--card,#141f33);border:1px solid var(--border2,rgba(255,255,255,.15));'
    +'border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:12px;'
    +'z-index:9999;font-family:"DM Sans",sans-serif;min-width:260px;box-shadow:0 4px 20px rgba(0,0,0,.4)';
  t.innerHTML=`
    <span style="font-size:.8rem;font-weight:700;color:var(--white,#eef2ff);flex:1">${msg}</span>
    <button id="_toast-undo-btn" style="height:28px;padding:0 12px;background:rgba(99,102,241,.15);
      border:1.5px solid rgba(99,102,241,.4);border-radius:7px;color:var(--indigo,#818cf8);
      font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:800;cursor:pointer;white-space:nowrap">
      ↩ Desfacer
    </button>`;
  document.body.appendChild(t);
  let timer=setTimeout(()=>t.remove(),durMs);
  t.querySelector('#_toast-undo-btn').onclick=()=>{clearTimeout(timer);t.remove();onDesfacer();};
}
</script>
